<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>골프존파크 도안빈스점 - 로그인</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-logo">⛳</div>
    <h1 class="login-title">골프존파크 도안빈스점</h1>
    <p class="login-subtitle">매출 관리 시스템</p>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" placeholder="아이디를 입력하세요" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
      </div>
      <div id="loginError" class="error-msg" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full">로그인</button>
    </form>
  </div>

  <script>
    // 이미 로그인된 경우 앱으로 이동
    if (localStorage.getItem('token')) {
      window.location.href = '/app.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const errorEl = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = '로그인 중...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = '/app.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
