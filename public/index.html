<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>골프존파크 도안빈스점 - 로그인</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">

  <!-- ───── 로그인 ───── -->
  <div class="login-container">
    <div class="login-logo">⛳</div>
    <h1 class="login-title">골프존파크 도안빈스점</h1>
    <p class="login-subtitle">매출 관리 시스템</p>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" placeholder="아이디를 입력하세요" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
      </div>
      <div id="loginError" class="error-msg" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full">로그인</button>
    </form>

    <div class="login-divider">또는</div>
    <button class="btn btn-outline btn-full" onclick="openRegisterModal()">회원가입</button>
    <p class="login-hint">초기 계정: <strong>admin</strong> / <strong>golf1234</strong></p>
  </div>

  <!-- ───── 회원가입 모달 ───── -->
  <div id="registerModal" class="modal-overlay" style="display:none" onclick="closeModalOnBg(event)">
    <div class="modal-box">
      <h3>회원가입</h3>
      <div class="form-group">
        <label>아이디 <span style="color:var(--text-sub);font-weight:400">(3자 이상)</span></label>
        <input type="text" id="regUsername" placeholder="사용할 아이디 입력" autocomplete="off">
      </div>
      <div class="form-group">
        <label>비밀번호 <span style="color:var(--text-sub);font-weight:400">(4자 이상)</span></label>
        <input type="password" id="regPassword" placeholder="비밀번호 입력">
      </div>
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" id="regConfirm" placeholder="비밀번호 다시 입력">
      </div>
      <div id="regError" class="error-msg" style="display:none"></div>
      <div id="regSuccess" class="success-msg" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeRegisterModal()">취소</button>
        <button class="btn btn-primary" onclick="submitRegister()">가입하기</button>
      </div>
    </div>
  </div>

  <script>
    // 이미 로그인된 경우 앱으로 이동
    if (localStorage.getItem('token')) {
      window.location.href = '/app.html';
    }

    // ─── 로그인 ───────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const errorEl = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = '로그인 중...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = '/app.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });

    // ─── 회원가입 모달 ────────────────────────────
    function openRegisterModal() {
      document.getElementById('regUsername').value = '';
      document.getElementById('regPassword').value = '';
      document.getElementById('regConfirm').value = '';
      document.getElementById('regError').style.display = 'none';
      document.getElementById('regSuccess').style.display = 'none';
      document.getElementById('registerModal').style.display = 'flex';
    }

    function closeRegisterModal() {
      document.getElementById('registerModal').style.display = 'none';
    }

    function closeModalOnBg(e) {
      if (e.target === document.getElementById('registerModal')) closeRegisterModal();
    }

    async function submitRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm  = document.getElementById('regConfirm').value;
      const errEl    = document.getElementById('regError');
      const succEl   = document.getElementById('regSuccess');
      errEl.style.display = 'none';
      succEl.style.display = 'none';

      if (!username || !password || !confirm) {
        errEl.textContent = '모든 항목을 입력해주세요';
        errEl.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errEl.textContent = '비밀번호가 일치하지 않습니다';
        errEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        succEl.textContent = '가입 완료! 로그인해주세요.';
        succEl.style.display = 'block';
        setTimeout(closeRegisterModal, 1500);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
