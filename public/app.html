<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>골프존파크 도안빈스점 - 매출 관리</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- ───── 헤더 ───── -->
<header class="app-header">
  <div class="header-left">
    <span class="header-logo">⛳</span>
    <span class="header-title">골프존파크 도안빈스점</span>
  </div>
  <div class="header-right">
    <span id="headerDate" class="header-date"></span>
    <span id="headerUser" class="header-user"></span>
    <button class="btn btn-sm btn-outline" onclick="openPasswordModal()">비밀번호 변경</button>
    <button class="btn btn-sm btn-danger" onclick="logout()">로그아웃</button>
  </div>
</header>

<!-- ───── 탭 내비게이션 ───── -->
<nav class="app-nav">
  <button class="nav-tab active" data-tab="dashboard">📋 대시보드</button>
  <button class="nav-tab" data-tab="history">📅 매출내역</button>
  <button class="nav-tab" data-tab="stats">📊 통계</button>
</nav>

<!-- ═══════════════════════════════════════════ -->
<!-- 대시보드 탭                                  -->
<!-- ═══════════════════════════════════════════ -->
<section id="tab-dashboard" class="tab-content active">
  <div class="dashboard-grid">

    <!-- 매출 입력 폼 -->
    <div class="card">
      <h2 class="card-title">매출 입력</h2>

      <div class="form-group">
        <label>날짜</label>
        <input type="date" id="saleDate" class="input-date">
      </div>

      <div class="form-group">
        <label>방 선택</label>
        <div class="room-grid" id="roomGrid">
          <button class="room-btn" data-room="1">1번</button>
          <button class="room-btn" data-room="2">2번</button>
          <button class="room-btn" data-room="3">3번</button>
          <button class="room-btn" data-room="4">4번</button>
          <button class="room-btn" data-room="5">5번</button>
          <button class="room-btn" data-room="6">6번</button>
          <button class="room-btn" data-room="7">7번</button>
          <button class="room-btn" data-room="8">8번</button>
        </div>
      </div>

      <div class="form-group">
        <label>결제수단</label>
        <div class="payment-grid" id="paymentGrid">
          <button class="payment-btn" data-pay="card">💳 카드</button>
          <button class="payment-btn" data-pay="cash">💵 현금</button>
          <button class="payment-btn" data-pay="transfer">🏦 계좌이체</button>
        </div>
      </div>

      <div class="form-group">
        <label for="saleAmount">금액 (원)</label>
        <input type="text" id="saleAmount" class="input-amount" placeholder="0" inputmode="numeric">
      </div>

      <div class="form-group">
        <label for="saleMemo">메모 (선택)</label>
        <input type="text" id="saleMemo" placeholder="예: 홍길동, 2인 등">
      </div>

      <div id="formError" class="error-msg" style="display:none"></div>
      <button id="submitBtn" class="btn btn-primary btn-full" onclick="submitSale()">등록하기</button>
      <button id="cancelEditBtn" class="btn btn-outline btn-full" style="display:none;margin-top:8px" onclick="cancelEdit()">수정 취소</button>
    </div>

    <!-- 오늘 매출 요약 -->
    <div class="card">
      <div class="summary-header">
        <h2 class="card-title">오늘 매출 요약</h2>
        <button class="btn btn-sm btn-outline" onclick="loadDashboard()">새로고침</button>
      </div>

      <div class="total-box">
        <div class="total-label">총 매출</div>
        <div class="total-amount" id="summaryTotal">₩0</div>
        <div class="total-count" id="summaryCount">0건</div>
      </div>

      <div class="payment-summary">
        <div class="pay-row">
          <span class="pay-label card-label">💳 카드</span>
          <span class="pay-amount" id="summaryCard">₩0</span>
        </div>
        <div class="pay-row">
          <span class="pay-label cash-label">💵 현금</span>
          <span class="pay-amount" id="summaryCash">₩0</span>
        </div>
        <div class="pay-row">
          <span class="pay-label transfer-label">🏦 계좌이체</span>
          <span class="pay-amount" id="summaryTransfer">₩0</span>
        </div>
      </div>

      <h3 class="section-subtitle">방별 매출</h3>
      <div class="room-summary" id="roomSummary"></div>
    </div>
  </div>

  <!-- 오늘 매출 목록 -->
  <div class="card mt-16">
    <div class="summary-header">
      <h2 class="card-title">오늘 매출 내역</h2>
      <button class="btn btn-sm btn-success" onclick="exportToday()">엑셀 내보내기</button>
    </div>
    <div class="table-wrap">
      <table class="data-table" id="todayTable">
        <thead>
          <tr>
            <th>시간</th>
            <th>방</th>
            <th>결제수단</th>
            <th>금액</th>
            <th>메모</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="todayBody"></tbody>
      </table>
    </div>
    <div id="todayEmpty" class="empty-msg" style="display:none">등록된 매출 내역이 없습니다.</div>
  </div>
</section>

<!-- ═══════════════════════════════════════════ -->
<!-- 매출내역 탭                                  -->
<!-- ═══════════════════════════════════════════ -->
<section id="tab-history" class="tab-content">
  <div class="card">
    <div class="filter-row">
      <div class="filter-group">
        <label>시작일</label>
        <input type="date" id="histStart">
      </div>
      <div class="filter-group">
        <label>종료일</label>
        <input type="date" id="histEnd">
      </div>
      <button class="btn btn-primary" onclick="loadHistory()">조회</button>
      <button class="btn btn-success" onclick="exportHistory()">엑셀 내보내기</button>
    </div>
  </div>

  <div class="card mt-16">
    <div class="hist-summary" id="histSummaryBox" style="display:none">
      <div class="hist-sum-item"><span>총 매출</span><strong id="histTotal">₩0</strong></div>
      <div class="hist-sum-item card-label"><span>카드</span><strong id="histCard">₩0</strong></div>
      <div class="hist-sum-item cash-label"><span>현금</span><strong id="histCash">₩0</strong></div>
      <div class="hist-sum-item transfer-label"><span>계좌이체</span><strong id="histTransfer">₩0</strong></div>
      <div class="hist-sum-item"><span>건수</span><strong id="histCount">0건</strong></div>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>날짜</th>
            <th>시간</th>
            <th>방</th>
            <th>결제수단</th>
            <th>금액</th>
            <th>메모</th>
          </tr>
        </thead>
        <tbody id="histBody"></tbody>
      </table>
    </div>
    <div id="histEmpty" class="empty-msg" style="display:none">조회된 매출 내역이 없습니다.</div>
  </div>
</section>

<!-- ═══════════════════════════════════════════ -->
<!-- 통계 탭                                     -->
<!-- ═══════════════════════════════════════════ -->
<section id="tab-stats" class="tab-content">
  <div class="card">
    <div class="filter-row">
      <div class="filter-group">
        <label>기간</label>
        <select id="statsPeriod" onchange="onStatsPeriodChange()">
          <option value="7">최근 7일</option>
          <option value="30" selected>최근 30일</option>
          <option value="90">최근 90일</option>
          <option value="custom">직접 선택</option>
        </select>
      </div>
      <div id="statsCustomRange" style="display:none;gap:8px;display:none" class="filter-group-row">
        <input type="date" id="statsStart">
        <span>~</span>
        <input type="date" id="statsEnd">
      </div>
      <button class="btn btn-primary" onclick="loadStats()">조회</button>
    </div>
  </div>

  <div class="stats-grid mt-16">
    <div class="card">
      <h2 class="card-title">일별 매출 추이</h2>
      <canvas id="dailyChart"></canvas>
    </div>
    <div class="card">
      <h2 class="card-title">결제수단별 매출</h2>
      <canvas id="paymentChart"></canvas>
    </div>
    <div class="card">
      <h2 class="card-title">방별 매출 현황</h2>
      <canvas id="roomChart"></canvas>
    </div>
    <div class="card">
      <h2 class="card-title">기간 요약</h2>
      <div id="statsSummary" class="stats-summary-box"></div>
    </div>
  </div>
</section>

<!-- ───── 비밀번호 변경 모달 ───── -->
<div id="pwModal" class="modal-overlay" style="display:none" onclick="closePwModalOnBg(event)">
  <div class="modal-box">
    <h3>비밀번호 변경</h3>
    <div class="form-group">
      <label>현재 비밀번호</label>
      <input type="password" id="pwCurrent" placeholder="현재 비밀번호">
    </div>
    <div class="form-group">
      <label>새 비밀번호</label>
      <input type="password" id="pwNew" placeholder="새 비밀번호 (4자 이상)">
    </div>
    <div class="form-group">
      <label>새 비밀번호 확인</label>
      <input type="password" id="pwConfirm" placeholder="새 비밀번호 확인">
    </div>
    <div id="pwError" class="error-msg" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closePasswordModal()">취소</button>
      <button class="btn btn-primary" onclick="changePassword()">변경하기</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
